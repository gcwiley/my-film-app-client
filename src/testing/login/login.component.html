<form (ngSubmit)="onSubmit(loginForm)" #loginForm="ngForm">

    <mat-card class="login-form">

        <mat-card-content>

            <mat-card-title>Login</mat-card-title>
            <mat-card-subtitle>Please enter your username and password</mat-card-subtitle>

            <!-- USERNAME (username) -->
            <mat-form-field class="full-width" appearance="outline">
                <mat-label>Username</mat-label>
                <input matInput type="text" name="username" required ngModel #username="ngModel">
                <mat-error>Please enter your username.</mat-error>
            </mat-form-field>

            <!-- PASSWORD (password) -->
            <mat-form-field class="full-width" appearance="outline">
                <mat-label>Password</mat-label>
                <input matInput type="password" name="password" required ngModel #password="ngModel">
                <mat-error>Please enter your password.</mat-error>
            </mat-form-field>

            <button mat-flat-button type="submit" color="primary">Login</button>
            <a mat-button color="pimary" routerLink="/signup">Sign Up</a>

        </mat-card-content>

    </mat-card>

</form>
